<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D — Выживание</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a12;
            font-family: 'Segoe UI', sans-serif;
        }
        #info {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.1);
            font-size: 12px;
            letter-spacing: 2px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">3D-СЦЕНА • ВЫЖИВАНИЕ</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.126.0/examples/jsm/controls/OrbitControls.js';

        // ----- СЦЕНА -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a12);

        // ----- КАМЕРА -----
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 8);
        camera.lookAt(0, 0, 0);

        // ----- РЕНДЕРЕР -----
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // ----- УПРАВЛЕНИЕ (для теста) -----
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.2;

        // ----- СВЕТ -----
        const ambientLight = new THREE.AmbientLight(0x222244, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(8, 12, 6);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
        fillLight.position.set(-4, 2, -4);
        scene.add(fillLight);

        // ----- ПОЛ (прозрачная сетка) -----
        const gridHelper = new THREE.GridHelper(12, 24, 0x444466, 0x222244);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);

        // ----- ЦЕНТРАЛЬНЫЙ ОБЪЕКТ (пока куб) -----
        const geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const material = new THREE.MeshStandardMaterial({
            color: 0x44dd88,
            roughness: 0.2,
            metalness: 0.1,
            emissive: new THREE.Color(0x224422),
            emissiveIntensity: 0.1,
        });
        const cube = new THREE.Mesh(geometry, material);
        cube.castShadow = true;
        cube.receiveShadow = true;
        cube.position.y = 0.2;
        scene.add(cube);

        // ----- ПАРЯЩИЕ КОЛЬЦА (для атмосферы) -----
        const ringGeo = new THREE.TorusGeometry(1.8, 0.04, 16, 60);
        const ringMat = new THREE.MeshStandardMaterial({
            color: 0x4488ff,
            transparent: true,
            opacity: 0.2,
            side: THREE.DoubleSide,
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2.5;
        ring.rotation.z = 0.3;
        ring.position.y = 0.2;
        scene.add(ring);

        // ----- АНИМАЦИЯ -----
        function animate() {
            requestAnimationFrame(animate);

            // вращение куба
            cube.rotation.x += 0.008;
            cube.rotation.y += 0.015;

            // кольцо слегка дышит
            ring.rotation.x += 0.002;
            ring.scale.setScalar(1 + Math.sin(Date.now() * 0.0006) * 0.02);

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // ----- АДАПТАЦИЯ ПОД РАЗМЕР ЭКРАНА -----
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });
    </script>
</body>
</html>
